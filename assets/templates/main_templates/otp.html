<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .otp-card {
      max-width: 420px;
      width: 100%;
      padding: 30px;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .otp-card img {
      width: 120px;
      margin-bottom: 20px;
    }
    .otp-input {
      letter-spacing: 12px;
      text-align: center;
      font-size: 22px;
      height: 50px;
    }
    .btn-custom {
      background-color: #4facfe;
      border: none;
      color: white;
      font-weight: bold;
    }
    .btn-custom:hover {
      background-color: #00c6ff;
    }
  </style>
</head>
<body>

    

  <div class="otp-card">
    <img src="https://cdn-icons-png.flaticon.com/512/2910/2910768.png" alt="OTP Icon">
    <h4 class="mb-3">Verify Your OTP</h4>
    <p class="text-muted">We’ve sent a 6-digit verification code to your registered email/phone.</p>
    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <input type="text" name="otp1" maxlength="4" class="form-control otp-input" placeholder="------" required>
      </div>
      <button type="submit" class="btn btn-custom w-100 py-2">Verify OTP</button>
    </form>
    <div class="mt-3">
      <small class="text-muted">Didn’t receive the code?</small><br>
      <a href="#" class="text-decoration-none">Resend OTP</a>
    </div>
  </div>
</body>
</html>
