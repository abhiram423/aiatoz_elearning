<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI A TO Z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep:   #060e1c;
            --card-dark: #0a1929;
            --cse-teal:  #00b4d8;
            --cse-blue:  #0077a3;
            --grad-teal: linear-gradient(135deg,#023e6d 0%,#0077a3 50%,#00b4d8 100%);
        }
        *,*::before,*::after { box-sizing:border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg,#060e1c 0%,#08162a 40%,#0a2040 70%,#083348 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
            padding: 40px 16px;
        }

        /* Background orbs */
        .shape {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .shape-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle,rgba(0,119,163,0.15) 0%,transparent 70%);
            filter: blur(90px);
            top: -150px; left: -100px;
        }
        .shape-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle,rgba(0,180,216,0.1) 0%,transparent 70%);
            filter: blur(80px);
            bottom: -100px; right: -80px;
        }

        .forgot-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
        }

        .premium-card {
            background: var(--card-dark);
            border: 1px solid rgba(0,180,216,0.18);
            border-radius: 28px;
            padding: 52px 44px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 40px rgba(0,180,216,0.04);
            position: relative;
            overflow: hidden;
        }
        .premium-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--grad-teal);
        }

        .icon-box {
            width: 68px; height: 68px;
            background: rgba(0,180,216,0.1);
            border: 1.5px solid rgba(0,180,216,0.25);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 22px;
            color: var(--cse-teal);
            font-size: 2rem;
        }

        h2 {
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            font-size: 26px;
        }

        .text-muted {
            font-size: 0.9rem;
            line-height: 1.65;
            margin-bottom: 28px;
            color: rgba(255,255,255,0.45) !important;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 4px 14px;
            border: 1.5px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            border-color: var(--cse-teal);
            background: rgba(0,180,216,0.05);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
        }
        .input-group-text {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
        }
        .form-control {
            background: transparent;
            border: none;
            padding: 13px 8px;
            font-weight: 500;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
        }
        .form-control:focus { box-shadow: none; background: transparent; color: #fff; }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }

        .btn-submit {
            background: var(--grad-teal);
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-weight: 800;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            width: 100%;
            margin-top: 22px;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(0,119,163,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,119,163,0.55);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.875rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--cse-teal); }

        .alert {
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(0,180,216,0.08);
            border: 1px solid rgba(0,180,216,0.25);
            color: var(--cse-teal);
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="forgot-container">
        <div class="premium-card">
            <div class="icon-box">
                <i class="fa-solid fa-envelope-open-text"></i>
            </div>
            <div class="text-center">
                <h2>Reset Password</h2>
                <p class="text-muted">Enter the email address associated with your account and we'll send a premium access link to reset your password.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-circle-info me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-at"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="example@aitoz.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Send Secure Link <i class="fa-solid fa-paper-plane ms-2"></i>
                </button>
            </form>

            <a href="{% url 'login' %}" class="back-link">
                <i class="fa-solid fa-arrow-left-long me-2"></i> Return to Login
            </a>
        </div>
        
        <div class="footer-note">&copy; 2026 AI A TO Z Academy &mdash; All rights reserved.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
