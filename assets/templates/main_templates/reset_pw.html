<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Reset | AI A TO Z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep:   #060e1c;
            --card-dark: #0a1929;
            --cse-teal:  #00b4d8;
            --cse-blue:  #0077a3;
            --grad-teal: linear-gradient(135deg,#023e6d 0%,#0077a3 50%,#00b4d8 100%);
        }
        *,*::before,*::after { box-sizing:border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg,#060e1c 0%,#08162a 40%,#0a2040 70%,#083348 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px 16px;
        }

        .reset-card {
            background: var(--card-dark);
            border: 1px solid rgba(0,180,216,0.18);
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            padding: 52px 44px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 40px rgba(0,180,216,0.04);
            position: relative;
            overflow: hidden;
        }
        .reset-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--grad-teal);
        }

        .header-section {
            text-align: center;
            margin-bottom: 36px;
        }
        .shield-icon {
            width: 68px; height: 68px;
            background: rgba(0,180,216,0.1);
            border: 1.5px solid rgba(0,180,216,0.25);
            border-radius: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--cse-teal);
            margin-bottom: 18px;
        }
        .header-section h2 {
            font-weight: 800;
            color: #fff;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .header-section p {
            color: rgba(255,255,255,0.4);
            font-size: 13.5px;
            line-height: 1.65;
            margin: 0;
        }

        .input-box {
            position: relative;
            margin-bottom: 22px;
        }
        .input-box label {
            font-weight: 700;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        .input-box input {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s;
        }
        .input-box input::placeholder { color: rgba(255,255,255,0.2); }
        .input-box input:focus {
            outline: none;
            border-color: var(--cse-teal);
            background: rgba(0,180,216,0.05);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
        }
        .input-box i {
            position: absolute;
            left: 16px;
            top: 43px;
            color: rgba(255,255,255,0.25);
            font-size: 14px;
        }

        .password-hint {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            margin-top: -14px;
            margin-bottom: 18px;
            display: block;
            padding-left: 4px;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: #f87171;
            margin-bottom: 20px;
        }

        .btn-update {
            background: var(--grad-teal);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(0,119,163,0.4);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-update:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,119,163,0.55);
        }

        @media (max-width: 576px) {
            .reset-card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="header-section">
            <div class="shield-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <h2>Set New Password</h2>
            <p>Your identity has been verified. Create a strong new password for your account.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert py-2 small mb-4 border-0">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-box">
                <label>NEW PASSWORD</label>
                <i class="fa-solid fa-key"></i>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <span class="password-hint">Use 8+ characters with a mix of letters and numbers.</span>

            <div class="input-box">
                <label>CONFIRM PASSWORD</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-update">
                Update & Unlock Account <i class="fa-solid fa-unlock-keyhole ms-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
